apiVersion: apps/v1
kind: Deployment
metadata:
  name: tsflow
spec:
  replicas: 1
  strategy:
    type: Recreate  # Required for SQLite (single writer)
  selector:
    matchLabels:
      app: tsflow
  template:
    metadata:
      labels:
        app: tsflow
    spec:
      containers:
        - name: tsflow
          image: ghcr.io/rajsinghtech/tsflow:v1.1.4
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: PORT
              value: "8080"
            - name: TAILSCALE_TAILNET
              valueFrom:
                secretKeyRef:
                  name: tsflow
                  key: TAILSCALE_TAILNET
                  optional: true
            - name: TAILSCALE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tsflow
                  key: TAILSCALE_API_KEY
                  optional: true
            - name: TAILSCALE_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: tsflow
                  key: TAILSCALE_OAUTH_CLIENT_ID
                  optional: true
            - name: TAILSCALE_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tsflow
                  key: TAILSCALE_OAUTH_CLIENT_SECRET
                  optional: true
            - name: TAILSCALE_OAUTH_SCOPES
              valueFrom:
                secretKeyRef:
                  name: tsflow
                  key: TAILSCALE_OAUTH_SCOPES
                  optional: true
            - name: TAILSCALE_API_URL
              valueFrom:
                secretKeyRef:
                  name: tsflow
                  key: TAILSCALE_API_URL
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
      volumes:
        - name: data
          emptyDir: {}
